<mat-card>
  <mat-card-header>
    <mat-card-title>Subscriptions</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="loading-container" *ngIf="isLoading()">
      <mat-progress-spinner mode="indeterminate" diameter="48"></mat-progress-spinner>
    </div>

    <div class="table-container" *ngIf="!isLoading()">
      <div class="empty-state" *ngIf="dataSource.data.length === 0">
        <p>No subscriptions found for this customer</p>
      </div>

      <table mat-table [dataSource]="dataSource" *ngIf="dataSource.data.length > 0">

        <ng-container matColumnDef="handle">
          <th mat-header-cell *matHeaderCellDef>Handle</th>
          <td mat-cell *matCellDef="let subscription"><code>{{ subscription.handle }}</code></td>
        </ng-container>

        <ng-container matColumnDef="state">
          <th mat-header-cell *matHeaderCellDef>State</th>
          <td mat-cell *matCellDef="let subscription">
            <span class="status-badge status-{{ subscription.state }}">
              {{ SubscriptionStateUtils.getLabel(subscription.state) }}
            </span>
          </td>
        </ng-container>

        <ng-container matColumnDef="planHandle">
          <th mat-header-cell *matHeaderCellDef>Plan</th>
          <td mat-cell *matCellDef="let subscription">{{ subscription.planHandle }}</td>
        </ng-container>

        <ng-container matColumnDef="created">
          <th mat-header-cell *matHeaderCellDef>Created</th>
          <td mat-cell *matCellDef="let subscription">{{ subscription.created | date:'mediumDate' }}</td>
        </ng-container>

        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let subscription">
            <button
              mat-stroked-button
              color="warn"
              *ngIf="subscription.canPause()"
              (click)="pause.emit(subscription.handle)"
            >
              <mat-icon>pause</mat-icon>
              Pause
            </button>

            <button
              mat-stroked-button
              color="primary"
              *ngIf="subscription.canUnpause()"
              (click)="unpause.emit(subscription.handle)"
            >
              <mat-icon>play_arrow</mat-icon>
              Unpause
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <mat-paginator
        [pageSize]="10"
        [pageSizeOptions]="[5, 10, 25, 50]"
        showFirstLastButtons
        *ngIf="dataSource.data.length > 0"
      ></mat-paginator>
    </div>
  </mat-card-content>
</mat-card>
