<mat-card>
  <mat-card-header>
    <mat-card-title>Customers</mat-card-title>
    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Search by handle</mat-label>
      <input matInput (keyup)="applySearch($event)" placeholder="Enter customer handle">
    </mat-form-field>
  </mat-card-header>

  <mat-card-content>
    <div class="loading-container" *ngIf="isLoading()">
      <mat-progress-spinner mode="indeterminate" diameter="48"></mat-progress-spinner>
    </div>

    <div class="table-container" *ngIf="!isLoading()">
      <table mat-table [dataSource]="pageData().items" matSort>

        <ng-container matColumnDef="handle">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Handle</th>
          <td mat-cell *matCellDef="let customer"><code>{{ customer.handle }}</code></td>
        </ng-container>

        <ng-container matColumnDef="fullName">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Name</th>
          <td mat-cell *matCellDef="let customer">{{ customer.fullName }}</td>
        </ng-container>

        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
          <td mat-cell *matCellDef="let customer">{{ customer.email }}</td>
        </ng-container>

        <ng-container matColumnDef="company">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Company</th>
          <td mat-cell *matCellDef="let customer">{{ customer.company }}</td>
        </ng-container>

        <ng-container matColumnDef="created">
          <th mat-header-cell *matHeaderCellDef mat-sort-header>Created</th>
          <td mat-cell *matCellDef="let customer">{{ customer.created | date:'mediumDate' }}</td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;" class="customer-row"></tr>
      </table>

      <mat-paginator
        [length]="pageData().total"
        [pageSizeOptions]="[10, 20, 50, 100]"
        [pageSize]="pageSize()"
        [pageIndex]="pageIndex()"
        (page)="onPageChange($event)"
        showFirstLastButtons>
      </mat-paginator>
    </div>
  </mat-card-content>
